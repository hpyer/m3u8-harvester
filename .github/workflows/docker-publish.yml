name: Docker Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_ref:
        description: 'Git tag to build and publish, for example v1.1.0'
        required: true
        type: string

concurrency:
  group: docker-publish-${{ github.event_name == 'workflow_dispatch' && inputs.release_ref || github.ref }}
  cancel-in-progress: true

jobs:
  precheck:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      release_tag: ${{ steps.check.outputs.release_tag }}
      release_version: ${{ steps.check.outputs.release_version }}
      major_minor: ${{ steps.check.outputs.major_minor }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_ref || github.ref }}
          fetch-depth: 0

      - name: Verify tag commit is on main
        id: check
        shell: bash
        run: |
          release_ref="${{ github.event_name == 'workflow_dispatch' && inputs.release_ref || github.ref_name }}"
          release_tag="${release_ref#refs/tags/}"

          if [[ "$release_tag" != v* ]]; then
            echo "::error::Docker release requires a v* tag, got $release_ref."
            exit 1
          fi

          if ! git rev-parse --verify "$release_tag^{commit}" >/dev/null; then
            echo "::error::Release tag $release_tag was not found."
            exit 1
          fi

          git fetch origin main --no-tags
          release_sha="$(git rev-parse "$release_tag^{commit}")"
          release_version="${release_tag#v}"
          major_minor="$(cut -d. -f1,2 <<< "$release_version")"

          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "release_version=$release_version" >> "$GITHUB_OUTPUT"
          echo "major_minor=$major_minor" >> "$GITHUB_OUTPUT"
          if git merge-base --is-ancestor "$release_sha" origin/main; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            echo "Tag commit $release_sha is not on origin/main, skip Docker build."
          fi

  docker:
    needs: precheck
    if: needs.precheck.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.precheck.outputs.release_tag }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ needs.precheck.outputs.release_tag }}
            type=raw,value=${{ needs.precheck.outputs.release_version }}
            type=raw,value=${{ needs.precheck.outputs.major_minor }}
            type=sha,prefix=sha-

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            APP_DOCKER_IMAGE=ghcr.io/${{ github.repository }}
            APP_DOCKER_VERSION=${{ needs.precheck.outputs.release_version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
