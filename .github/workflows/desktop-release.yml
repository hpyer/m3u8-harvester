name: Desktop Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  precheck:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag commit is on main
        id: check
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git fetch origin main --no-tags
          if git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            echo "Tag commit $GITHUB_SHA is not on origin/main, skip desktop release."
            exit 0
          fi

          tag_version="${GITHUB_REF_NAME#v}"
          app_version="$(node -p "require('./apps/desktop/src-tauri/tauri.conf.json').version")"
          if [[ "$tag_version" != "$app_version" ]]; then
            echo "::error::Tag version $tag_version does not match Tauri app version $app_version."
            exit 1
          fi

  build:
    needs: precheck
    if: needs.precheck.outputs.should_build == 'true'
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows
            os: windows-latest
            target: x86_64-pc-windows-msvc
            bundle-path: target/x86_64-pc-windows-msvc/release/bundle
            asset-suffix: windows-x64
          - name: macos-intel
            os: macos-13
            target: x86_64-apple-darwin
            bundle-path: target/x86_64-apple-darwin/release/bundle
            asset-suffix: macos-x64
          - name: macos-apple-silicon
            os: macos-14
            target: aarch64-apple-darwin
            bundle-path: target/aarch64-apple-darwin/release/bundle
            asset-suffix: macos-aarch64
          - name: linux
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundle-path: target/x86_64-unknown-linux-gnu/release/bundle
            asset-suffix: linux-x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            rpm \
            wget

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
          key: desktop-${{ matrix.target }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate desktop icons
        run: pnpm icon:desktop

      - name: Build desktop bundle
        run: pnpm --filter @m3u8-harvester/desktop tauri build --target ${{ matrix.target }}

      - name: Normalize release asset names
        shell: bash
        run: |
          set -euo pipefail

          version="$(node -p "require('./apps/desktop/src-tauri/tauri.conf.json').version")"
          mkdir -p release-assets
          shopt -s globstar nullglob

          for file in "${{ matrix.bundle-path }}"/**/*.{dmg,msi,exe,deb,rpm,AppImage}; do
            [[ -f "$file" ]] || continue
            case "$file" in
              *.AppImage) ext="AppImage" ;;
              *) ext="${file##*.}" ;;
            esac
            cp "$file" "release-assets/m3u8-harvester_${version}_${{ matrix.asset-suffix }}.${ext}"
          done

          count="$(find release-assets -type f | wc -l | tr -d ' ')"
          if [[ "$count" == "0" ]]; then
            echo "::error::No bundle assets found under ${{ matrix.bundle-path }}"
            exit 1
          fi

          find release-assets -maxdepth 1 -type f -print

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.name }}
          path: |
            release-assets/*
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download bundle artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Extract release notes from changelog
        shell: bash
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME#v}"
          awk -v version="$version" '
            index($0, "## [" version "]") == 1 {
              found = 1
              print
              next
            }
            found && /^## \[/ {
              exit
            }
            found {
              print
            }
          ' CHANGELOG.md > release-notes.md

          if [[ ! -s release-notes.md ]]; then
            echo "::error::No CHANGELOG.md entry found for version $version."
            exit 1
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          body_path: release-notes.md
          files: |
            release-assets/*
